<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Ratings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }

        .book-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .book-item {
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 200px;
        }

        .book-item img {
            max-width: 100%;
            height: auto;
        }

        .rating {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .star {
            font-size: 2em;
            color: #ffd700;
            margin: 0 5px;
        }

        .star.empty {
            color: #ccc;
        }

        .top-right {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .top-right button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        .top-right button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-right">
            <button id="back">Back</button>
        </div>
        <h1>Saved Ratings</h1>
        <div class="book-list" id="saved-book-list">
            <!-- Saved book ratings will be displayed here -->
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('back').addEventListener('click', function() {
                window.location.href = 'index.html';
            });

            displaySavedRatings();

            async function displaySavedRatings() {
                const savedRatings = JSON.parse(localStorage.getItem('bookRatings')) || [];
                const savedBookList = document.getElementById('saved-book-list');
                savedBookList.innerHTML = ''; // Clear previous results

                for (const ratingInfo of savedRatings) {
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes/${ratingInfo.bookId}`);
                    const book = await response.json();

                    const bookItem = document.createElement('div');
                    bookItem.classList.add('book-item');
                    bookItem.innerHTML = `
                        <img src="${book.volumeInfo.imageLinks?.thumbnail || 'https://via.placeholder.com/150x200'}" alt="${book.volumeInfo.title}">
                        <h3>${book.volumeInfo.title}</h3>
                        <div class="rating" data-rating="${ratingInfo.rating}">
                            <span class="star ${ratingInfo.rating >= 1 ? '' : 'empty'}" data-value="1">&#9733;</span>
                            <span class="star ${ratingInfo.rating >= 2 ? '' : 'empty'}" data-value="2">&#9733;</span>
                            <span class="star ${ratingInfo.rating >= 3 ? '' : 'empty'}" data-value="3">&#9733;</span>
                            <span class="star ${ratingInfo.rating >= 4 ? '' : 'empty'}" data-value="4">&#9733;</span>
                            <span class="star ${ratingInfo.rating >= 5 ? '' : 'empty'}" data-value="5">&#9733;</span>
                        </div>
                    `;
                    savedBookList.appendChild(bookItem);
                }
            }
        });
    </script>
</body>
</html>
