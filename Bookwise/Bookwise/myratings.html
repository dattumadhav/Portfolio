<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rated Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }

        .book-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .book-item {
            background-color: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 200px;
        }

        .book-item img {
            max-width: 100%;
            height: auto;
        }

        .rating {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .star {
            font-size: 2em;
            color: #ffd700;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rated Books</h1>
        <div class="book-list" id="book-list">
            <!-- Rated books will be injected here -->
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchRatedBooks();

            async function fetchRatedBooks() {
                const myRatings = JSON.parse(localStorage.getItem('myRatings')) || [];
                const bookList = document.getElementById('book-list');
                bookList.innerHTML = ''; // Clear previous results

                for (const rating of myRatings) {
                    const bookId = rating.bookId;
                    const response = await fetch(`https://www.googleapis.com/books/v1/volumes/${bookId}?key='AIzaSyAPg4INxVOy4lFVx3G5rhEU0bzd0LbLfWk'`);
                    const book = await response.json();
                    displayBook(book, rating.rating);
                }
            }

            function displayBook(book, rating) {
                const bookItem = document.createElement('div');
                bookItem.classList.add('book-item');

                bookItem.innerHTML = `
                    <img src="${book.volumeInfo.imageLinks.thumbnail }" alt="${book.volumeInfo.title}">
                    <h3>${book.volumeInfo.title}</h3>
                    <div class="rating">
                        ${generateStarRating(rating)}
                    </div>
                `;
                document.getElementById('book-list').appendChild(bookItem);
            }

            function generateStarRating(rating) {
                let stars = '';
                for (let i = 1; i <= 5; i++) {
                    stars += `<span class="star ${i <= rating ? '' : 'empty'}">&#9733;</span>`;
                }
                return stars;
            }
        });
    </script>
</body>
</html>
