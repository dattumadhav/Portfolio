<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Book Categories</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {  
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width:70vw;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .category {
            width: 150px;
            height:40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding-left:15px;
        }

        #categories{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .category label {
            margin-left: 10px;
        }
        button {
            margin-left:32vw;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Your Favourate Genres</h1>
        <div id="categories"></div>
        <a href="recommendation.html"><button onclick="submitCategories()">Submit</button></a>
    </div>

    <script src="interests.js"></script>
</body>
</html>
